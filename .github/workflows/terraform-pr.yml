name: Terraform PR Validation

on:
    pull_request:
        branches: [main]
        paths:
            - "gcp/**"
            - "aws/**"
            - ".github/workflows/**"

jobs:
    terraform-validate:
        name: Terraform Validation
        runs-on: ubuntu-latest

        strategy:
            matrix:
                directory: [gcp, aws]

        steps:
            - name: Checkout Code
              uses: actions/checkout@v4

            - name: Setup Terraform
              uses: hashicorp/setup-terraform@v3
              with:
                  terraform_version: 1.6.0

            - name: Terraform Format Check
              working-directory: ./${{ matrix.directory }}
              run: terraform fmt -check -recursive
              continue-on-error: true

            - name: Terraform Init
              working-directory: ./${{ matrix.directory }}
              run: terraform init -backend=false

            - name: Terraform Validate
              working-directory: ./${{ matrix.directory }}
              run: terraform validate

            - name: Run tflint
              uses: terraform-linters/setup-tflint@v4
              with:
                  tflint_version: latest

            - name: Lint Terraform
              working-directory: ./${{ matrix.directory }}
              run: |
                  tflint --init
                  tflint --format compact

    security-scan:
        name: Security Scanning
        runs-on: ubuntu-latest

        steps:
            - name: Checkout Code
              uses: actions/checkout@v4

            - name: Run Checkov (Terraform Security)
              uses: bridgecrewio/checkov-action@master
              with:
                  directory: .
                  framework: terraform
                  soft_fail: true # Don't fail build, just warn
                  output_format: cli

            - name: Run tfsec (Terraform Security)
              uses: aquasecurity/tfsec-action@v1.0.0
              with:
                  working_directory: .
                  soft_fail: true

    cost-estimate:
        name: Terraform Cost Estimation
        runs-on: ubuntu-latest

        steps:
            - name: Checkout Code
              uses: actions/checkout@v4

            - name: Setup Infracost
              uses: infracost/actions/setup@v2
              with:
                  api-key: ${{ secrets.INFRACOST_API_KEY }}

            - name: Generate Infracost estimate
              run: |
                  infracost breakdown --path=gcp \
                    --format=table \
                    --show-skipped > infracost-gcp.txt

                  infracost breakdown --path=aws \
                    --format=table \
                    --show-skipped > infracost-aws.txt

            - name: Post cost estimate to PR
              uses: actions/github-script@v7
              with:
                  script: |
                      const fs = require('fs');
                      const gcpCost = fs.readFileSync('infracost-gcp.txt', 'utf8');
                      const awsCost = fs.readFileSync('infracost-aws.txt', 'utf8');

                      github.rest.issues.createComment({
                        issue_number: context.issue.number,
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        body: `## 💰 Infrastructure Cost Estimate\n\n### GCP:\n\`\`\`\n${gcpCost}\n\`\`\`\n\n### AWS:\n\`\`\`\n${awsCost}\n\`\`\``
                      });

    python-tests:
        name: Python Function Tests
        runs-on: ubuntu-latest

        steps:
            - name: Checkout Code
              uses: actions/checkout@v4

            - name: Setup Python
              uses: actions/setup-python@v4
              with:
                  python-version: "3.11"

            - name: Install Dependencies
              run: |
                  pip install pylint pytest
                  cd gcp/functions/auto-failover
                  pip install -r requirements.txt

            - name: Lint Python Code
              run: |
                  pylint gcp/functions/auto-failover/main.py || true
                  pylint gcp/functions/db-backup/main.py || true

            - name: Run Python Tests
              run: |
                  pytest tests/ -v || echo "No tests yet"

    summary:
        name: PR Validation Summary
        runs-on: ubuntu-latest
        needs: [terraform-validate, security-scan, python-tests]
        if: always()

        steps:
            - name: PR Status Comment
              uses: actions/github-script@v7
              with:
                  script: |
                      const status = '${{ needs.terraform-validate.result }}' === 'success' && 
                                    '${{ needs.security-scan.result }}' === 'success' && 
                                    '${{ needs.python-tests.result }}' === 'success' 
                                    ? '✅ All checks passed!' 
                                    : '❌ Some checks failed';

                      github.rest.issues.createComment({
                        issue_number: context.issue.number,
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        body: `## CI/CD Pipeline Results\n\n${status}\n\n- Terraform: ${{ needs.terraform-validate.result }}\n- Security: ${{ needs.security-scan.result }}\n- Python Tests: ${{ needs.python-tests.result }}`
                      });
